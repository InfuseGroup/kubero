name: Build and push Kubero image
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - registry: pinpoint-internal-platform-staging
            token_secret: DOCR_TOKEN_STAGING
          - registry: pinpoint-internal-platform
            token_secret: DOCR_TOKEN_PRODUCTION
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets[matrix.token_secret] }}
          password: ${{ secrets[matrix.token_secret] }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          tags: |
            registry.digitalocean.com/${{ matrix.registry }}/kubero:v3.1.1-patched
            registry.digitalocean.com/${{ matrix.registry }}/kubero:latest
